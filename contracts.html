<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Contracts — TOEIC 600</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Nunito',sans-serif;background:#0B0F1A;color:#F1F5F9;min-height:100vh;-webkit-font-smoothing:antialiased}
button{font-family:inherit;cursor:pointer}
input{font-family:inherit}
::-webkit-scrollbar{width:4px}::-webkit-scrollbar-thumb{background:#333;border-radius:4px}
@keyframes fadeUp{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}
@keyframes wrong{0%,100%{transform:translateX(0)}25%{transform:translateX(-5px)}75%{transform:translateX(5px)}}
@keyframes listening{0%,100%{box-shadow:0 0 0 0 rgba(99,102,241,0.4)}50%{box-shadow:0 0 0 16px rgba(99,102,241,0)}}

.wrap{max-width:560px;margin:0 auto}
.topbar{display:flex;align-items:center;justify-content:space-between;padding:12px 16px;background:#0F1322;border-bottom:1px solid #1E2640}
.topbar a{background:none;border:none;font-size:18px;color:#64748B;font-weight:700;text-decoration:none}
.topbar span{font-size:15px;font-weight:800}
.tabs{display:flex;justify-content:center;gap:8px;padding:12px 16px;background:#0F1322;border-bottom:1px solid #1E2640}
.tab-btn{padding:8px 18px;border-radius:20px;font-size:13px;font-weight:700;border:2px solid #1E2640;background:transparent;color:#64748B;transition:all 0.15s}
.tab-btn.active{border-color:var(--accent);background:var(--accent);color:#fff}
.content{display:none}.content.active{display:block}

/* Word list */
.wl-wrap{padding:14px 14px 28px}
.wl-title{font-size:14px;font-weight:800;color:#94A3B8;margin-bottom:12px}
.wl-card{background:#151A2D;border-radius:16px;padding:18px;margin-bottom:12px;border:1px solid #1E2640;animation:fadeUp 0.3s ease both}
.wl-head{display:flex;align-items:flex-start;justify-content:space-between;gap:10px}
.wl-word{font-size:20px;font-weight:900;color:#F1F5F9}
.wl-speak{background:none;border:none;font-size:16px;color:#64748B}
.wl-pos{font-size:11px;font-weight:700;padding:2px 8px;border-radius:8px;background:color-mix(in srgb,var(--accent) 15%,transparent);color:var(--accent)}
.wl-ipa{font-size:12px;color:#4B5563;margin-top:3px}
.wl-vi{font-size:16px;font-weight:800;color:var(--accent);white-space:nowrap}
.wl-sep{height:1px;background:#1E2640;margin:12px 0}
.wl-ex{font-size:13px;color:#CBD5E1;line-height:1.55;margin-bottom:12px}
.wl-ex b{color:#64748B;font-size:12px}
.wl-ex-vi{font-size:12px;color:#4B5563;margin-top:3px}
.wl-label{font-size:12px;font-weight:700;color:#64748B;margin-bottom:5px}
.wl-tags{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:10px}
.wl-col{font-size:11px;padding:4px 10px;border-radius:14px;background:color-mix(in srgb,var(--accent) 12%,transparent);color:var(--accent);font-weight:600}
.wl-syn{font-size:11px;padding:4px 10px;border-radius:14px;background:rgba(6,78,59,0.2);color:#34D399;font-weight:600}

/* Common */
.card{background:#151A2D;border-radius:20px;padding:26px 20px;box-shadow:0 2px 16px rgba(0,0,0,0.15);text-align:center;border:1px solid #1E2640;min-height:180px}
.chip{font-size:11px;padding:3px 9px;border-radius:10px;font-weight:700;display:inline-block;margin-bottom:6px;background:color-mix(in srgb,var(--accent) 15%,transparent);color:var(--accent)}
.big-word{font-size:32px;font-weight:900;margin:8px 0}
.big-vi{font-size:28px;font-weight:900;margin:0 0 12px}
.ipa-row{display:flex;align-items:center;justify-content:center;gap:10px;margin-bottom:16px}
.ipa-row button{background:none;border:none;font-size:20px;cursor:pointer}
.ipa-row span{font-size:14px;color:#4B5563}
.ex-box{background:#0B0F1A;border-radius:12px;padding:12px;margin-bottom:12px;text-align:left}
.ex-box .en{font-size:13px;color:#CBD5E1;font-style:italic;line-height:1.5}
.ex-box .vi{font-size:12px;color:#4B5563;margin-top:3px}
.tag-row{display:flex;flex-wrap:wrap;gap:5px;justify-content:center;margin-bottom:8px}
.syn-row{display:flex;flex-wrap:wrap;align-items:center;justify-content:center;gap:5px}
.btn-primary{padding:13px 22px;font-size:14px;font-weight:700;color:#fff;border:none;border-radius:14px;cursor:pointer;box-shadow:0 4px 14px rgba(0,0,0,0.2);flex:1;text-align:center;background:var(--accent)}
.btn-second{padding:13px 22px;font-size:14px;font-weight:700;color:#4ADE80;border:2px solid #065F46;border-radius:14px;cursor:pointer;flex:1;text-align:center;background:#064E3B}
.action-row{display:flex;gap:10px;margin-top:12px}
.progress-bar{height:4px;background:#1E2640;margin:0 14px 10px}
.progress-fill{height:100%;background:var(--accent);border-radius:2px;transition:width 0.4s}
.mode-chips{display:flex;justify-content:center;gap:5px;padding:0 8px 10px;flex-wrap:wrap}
.mode-chip{font-size:11px;padding:4px 10px;border-radius:14px;font-weight:700;border:1.5px solid #1E2640;background:transparent;color:#475569}
.mode-chip.active{background:var(--accent);color:#fff;border-color:var(--accent)}
.bottom-stats{text-align:center;padding:12px 0;font-size:13px;color:#475569}

/* Quiz */
.quiz-opt{display:flex;align-items:center;gap:12px;padding:12px 14px;background:#0B0F1A;border:2px solid #1E2640;border-radius:14px;cursor:pointer;font-size:14px;font-weight:600;color:#CBD5E1;text-align:left;transition:all 0.12s;width:100%;margin-bottom:7px}
.quiz-opt.correct{background:rgba(6,78,59,0.25);border-color:#22C55E;color:#4ADE80}
.quiz-opt.wrong{background:rgba(127,29,29,0.25);border-color:#EF4444;color:#FCA5A5;animation:wrong 0.3s}
.opt-num{width:24px;height:24px;border-radius:50%;background:color-mix(in srgb,var(--accent) 15%,transparent);color:var(--accent);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:800;flex-shrink:0}

/* Typing */
.typ-input{width:100%;padding:13px 14px;font-size:17px;font-weight:600;border:2.5px solid var(--accent);border-radius:14px;outline:none;text-align:center;background:#0B0F1A;color:#F1F5F9}
.typ-input.ok{border-color:#22C55E;background:rgba(6,78,59,0.2)}
.typ-input.bad{border-color:#EF4444;background:rgba(127,29,29,0.2)}
.hint-btn{width:42px;height:42px;border-radius:50%;border:2px solid #1E2640;background:#0B0F1A;font-size:18px;display:flex;align-items:center;justify-content:center;flex-shrink:0;cursor:pointer}

/* Mic */
.mic-btn{width:72px;height:72px;border-radius:50%;background:linear-gradient(135deg,var(--accent),#06B6D4);border:none;font-size:28px;cursor:pointer;color:#fff;display:inline-flex;align-items:center;justify-content:center;box-shadow:0 4px 20px color-mix(in srgb,var(--accent) 40%,transparent)}
.mic-btn.on{animation:listening 1.2s infinite}
.score-bar{height:8px;background:#1E2640;border-radius:4px;overflow:hidden;margin-top:8px}
.score-fill{height:100%;border-radius:4px;transition:width 0.5s}

/* SR */
.sr-row{display:flex;gap:7px;margin-top:12px}
.sr-btn{flex:1;padding:13px 4px;border:none;border-radius:14px;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:2px;box-shadow:0 2px 8px rgba(0,0,0,0.2)}
.sr-btn span:first-child{font-weight:700;color:#fff;font-size:12px}
.sr-btn span:last-child{color:rgba(255,255,255,0.75);font-size:11px}

/* Game */
.game-header{display:flex;justify-content:center;gap:10px;margin-bottom:14px}
.game-stat{padding:5px 12px;border-radius:16px;font-size:12px;font-weight:700}
.match-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:9px}
.match-card{padding:15px 8px;border-radius:14px;font-weight:600;cursor:pointer;text-align:center;min-height:52px;display:flex;align-items:center;justify-content:center;line-height:1.3;transition:all 0.15s;border:2.5px solid transparent;box-shadow:0 1px 4px rgba(0,0,0,0.15)}
.match-card.matched{opacity:0.35;transform:scale(0.95);cursor:default;box-shadow:none}
.match-card.wrong-pair{animation:wrong 0.3s}
</style>
</head>

/* ═══════════════  HELPERS  ═══════════════ */
function shuffle(a){const b=[...a];for(let i=b.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[b[i],b[j]]=[b[j],b[i]];}return b;}
function speak(t){if(!window.speechSynthesis)return;window.speechSynthesis.cancel();const u=new SpeechSynthesisUtterance(t);u.lang="en-US";u.rate=0.85;window.speechSynthesis.speak(u);}

function switchTab(id, btn){
  document.querySelectorAll('.content').forEach(c=>c.classList.remove('active'));
  document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));
  document.getElementById('tab-'+id).classList.add('active');
  btn.classList.add('active');
  if(id==='learn') initLearn();
  if(id==='play') initPlay();
}

      <div class="wl-label" style="color:#4B5563">≈ Đồng nghĩa</div>
      <div class="wl-tags">${w.synonyms.map(s=>'<span class="wl-syn">'+s+'</span>').join('')}</div>
    </div>
  `).join('')+'</div>';
})();

/* ═══════════════  TAB 2: HỌC  ═══════════════ */
let learnState={};
function initLearn(){
  const s=learnState={idx:0,order:shuffle(WORDS.map((_,i)=>i)),mode:'flashcard',flipped:false,qAns:null,qOpts:[],typV:'',typR:null,hint:false,pronR:null,lis:false,learned:{},done:false};
  renderLearn();
}
function getWord(){return WORDS[learnState.order[learnState.idx]];}
function renderLearn(){
  const s=learnState, el=document.getElementById('tab-learn'), w=getWord(), total=WORDS.length;
  if(s.done){el.innerHTML=`<div style="padding:40px;text-align:center"><div style="font-size:56px;margin-bottom:10px">🎉</div><h2 style="font-size:22px;font-weight:800;margin-bottom:6px">Hoàn thành!</h2><p style="color:#64748B;margin-bottom:20px">Đã học xong ${total} từ</p><button class="btn-primary" onclick="initLearn()">Học lại</button></div>`;return;}
  const mi=['flashcard','quiz','typing','pronunciation','sr'].indexOf(s.mode);
  const lc=Object.keys(s.learned).length;
  const progress=(s.idx/total)*100;
  const modes=[{k:'flashcard',l:'📇 Flashcard'},{k:'quiz',l:'📝 Trắc nghiệm'},{k:'typing',l:'⌨️ Gõ từ'},{k:'pronunciation',l:'🎙️ Phát âm'}];

  let html=`<div class="progress-bar"><div class="progress-fill" style="width:${progress}%"></div></div>`;
  html+=`<div class="mode-chips">${modes.map((m,i)=>`<span class="mode-chip ${s.mode===m.k||(s.mode==='sr'&&m.k==='pronunciation')?'active':''}" style="opacity:${i<=mi?1:0.3}">${m.l}</span>`).join('')}</div>`;
  html+=`<div style="padding:0 14px">`;

  if(s.mode==='flashcard'){
    if(!s.flipped){
      html+=`<div class="card" onclick="learnState.flipped=true;renderLearn()"><span class="chip">${w.pos}</span><h2 class="big-word">${w.word}</h2><div class="ipa-row"><button onclick="event.stopPropagation();speak('${w.word.replace(/'/g,"\\'")}')">🔊</button><span>${w.ipa_us}</span></div><p style="color:#334155;font-style:italic;font-size:13px">Nhấn để xem nghĩa</p></div>`;
    } else {
      html+=`<div class="card" onclick="learnState.flipped=false;renderLearn()"><h2 class="big-vi">${w.vi}</h2><div class="ex-box"><p class="en">"${w.example}"</p><p class="vi">(${w.exampleVi})</p></div><div class="tag-row">${w.collocations.map(c=>'<span class="wl-col">'+c+'</span>').join('')}</div><div class="syn-row"><span style="font-size:11px;color:#4B5563">≈</span>${w.synonyms.map(x=>'<span class="wl-syn">'+x+'</span>').join('')}</div></div>`;
      html+=`<div class="action-row"><button class="btn-second" onclick="learnState.flipped=false;renderLearn()">☑ Đã thuộc</button><button class="btn-primary" onclick="advanceMode()">Học tiếp →</button></div>`;
    }
  }
  else if(s.mode==='quiz'){
    if(s.qOpts.length===0){s.qOpts=shuffle([w.vi,...w.distractors]);s.qAns=null;}
    html+=`<div class="card"><span class="chip">${w.pos}</span><h2 class="big-word" style="font-size:30px">${w.word}</h2><div class="ipa-row"><button onclick="speak('${w.word.replace(/'/g,"\\'")}')">🔊</button><span>${w.ipa_us}</span></div>`;
    s.qOpts.forEach((o,i)=>{
      let cls='quiz-opt';
      if(s.qAns!==null){if(o===w.vi)cls+=' correct';else if(o===s.qAns)cls+=' wrong';}
      html+=`<button class="${cls}" onclick="quizAnswer('${o.replace(/'/g,"\\'")}')">`+
        `<span class="opt-num">${i+1}</span>${o}</button>`;
    });
    html+=`</div>`;
    if(s.qAns)html+=`<button class="btn-primary" style="margin-top:12px;width:100%" onclick="advanceMode()">Tiếp tục →</button>`;
  }
  else if(s.mode==='typing'){
    const bc=s.typR==='correct'?'#22C55E':s.typR==='wrong'?'#EF4444':'var(--accent)';
    const cls=s.typR==='correct'?'ok':s.typR==='wrong'?'bad':'';
    html+=`<div class="card"><span class="chip">${w.pos}</span><h2 class="big-vi" style="font-size:26px">${w.vi}</h2>
      <input class="typ-input ${cls}" style="border-color:${bc}" id="typInput" placeholder="Gõ từ tiếng Anh..." value="${s.typV}" ${s.typR?'disabled':''} oninput="learnState.typV=this.value" onkeydown="if(event.key==='Enter'&&!learnState.typR)checkTyping()">
      <div style="display:flex;align-items:center;gap:10px;margin-top:12px"><button class="hint-btn" onclick="learnState.hint=true;renderLearn()">💡</button><button class="btn-primary" style="flex:1" onclick="checkTyping()" ${s.typR?'disabled':''}>Kiểm tra</button></div>`;
    if(s.hint&&!s.typR)html+=`<p style="color:#F59E0B;font-size:13px;margin-top:8px;font-weight:600">Gợi ý: ${w.word.slice(0,Math.ceil(w.word.length/3))}...</p>`;
    if(s.typR==='wrong')html+=`<p style="color:#FCA5A5;margin-top:8px;font-size:14px">Đáp án: <strong>${w.word}</strong></p>`;
    html+=`</div>`;
    if(s.typR)html+=`<button class="btn-primary" style="margin-top:12px;width:100%" onclick="advanceMode()">Tiếp tục →</button>`;
  }
  else if(s.mode==='pronunciation'){
    html+=`<div class="card"><p style="font-size:11px;font-weight:700;color:#475569;letter-spacing:1.5px;text-transform:uppercase">PHÁT ÂM TỪ NÀY</p><h2 class="big-vi" style="font-size:26px">${w.vi}</h2><p style="font-size:17px;color:#64748B;margin-bottom:18px">${w.word}</p>
      <button class="mic-btn ${s.lis?'on':''}" onclick="startMic()">🎙️</button><p style="color:#475569;font-size:13px;margin-top:8px">${s.lis?'Đang nghe...':'Nhấn để nói'}</p>`;
    if(s.pronR){
      const sc=s.pronR.score,col=sc>=70?'#22C55E':sc>=40?'#F59E0B':'#EF4444';
      html+=`<div style="margin-top:16px;padding:12px;background:#0B0F1A;border-radius:12px"><p style="font-size:13px;color:#CBD5E1;margin-bottom:8px">Bạn nói: "${s.pronR.text}"</p><div class="score-bar"><div class="score-fill" style="width:${sc}%;background:${col}"></div></div><p style="font-size:20px;font-weight:800;margin-top:8px">${sc}%</p></div>`;
    }
    html+=`</div><div style="display:flex;gap:10px;margin-top:12px"><button style="flex:0.6;padding:11px;font-size:13px;font-weight:600;color:#475569;background:#151A2D;border:1.5px solid #1E2640;border-radius:14px;text-align:center" onclick="advanceMode()">⏭ Bỏ qua</button>`;
    if(s.pronR)html+=`<button class="btn-primary" onclick="advanceMode()">Tiếp tục →</button>`;
    html+=`</div>`;
  }
  else if(s.mode==='sr'){
    html+=`<div class="card"><h2 class="big-vi" style="font-size:26px">${w.vi}</h2><div class="ex-box"><p class="en">"${w.example}"</p><p class="vi">(${w.exampleVi})</p></div><div class="tag-row">${w.collocations.map(c=>'<span class="wl-col">'+c+'</span>').join('')}</div><p style="color:#475569;font-size:12px;margin-top:10px;font-style:italic">Bạn nhớ từ này ở mức nào?</p></div>`;
    html+=`<div class="sr-row">`;
    [{l:'Học lại',s:'1m',c:'#EF4444'},{l:'Khó',s:'6h',c:'#F59E0B'},{l:'Tốt',s:'1d',c:'#22C55E'},{l:'Dễ',s:'3d',c:'#3B82F6'}].forEach((r,i)=>{
      html+=`<button class="sr-btn" style="background:${r.c}" onclick="handleSR(${i})"><span>${r.l}</span><span>${r.s}</span></button>`;
    });
    html+=`</div>`;
  }

  html+=`</div>`;
  html+=`<div class="bottom-stats"><span style="color:var(--accent);font-weight:700">${total-lc}</span> Từ mới  <span style="color:#4ADE80;font-weight:700;margin-left:10px">${lc}</span> Đã học  <span style="margin-left:10px">${s.idx+1}/${total}</span></div>`;
  el.innerHTML=html;
  if(s.mode==='typing'&&!s.typR){const inp=document.getElementById('typInput');if(inp)inp.focus();}
}

function advanceMode(){
  const s=learnState;
  if(s.mode==='flashcard'){s.mode='quiz';s.qOpts=[];s.qAns=null;}
  else if(s.mode==='quiz'){s.mode='typing';s.typV='';s.typR=null;s.hint=false;}
  else if(s.mode==='typing'){s.mode='pronunciation';s.pronR=null;}
  else if(s.mode==='pronunciation')s.mode='sr';
  renderLearn();
}
function nextWord(){
  const s=learnState;
  if(s.idx<WORDS.length-1){s.idx++;s.mode='flashcard';s.flipped=false;s.qAns=null;s.qOpts=[];s.typV='';s.typR=null;s.hint=false;s.pronR=null;renderLearn();}
  else{s.done=true;renderLearn();}
}
function quizAnswer(ans){if(learnState.qAns)return;learnState.qAns=ans;renderLearn();}
function checkTyping(){const w=getWord();learnState.typR=learnState.typV.toLowerCase().trim()===w.word.toLowerCase().trim()?'correct':'wrong';renderLearn();}
function handleSR(lvl){learnState.learned[getWord().id]=lvl;setTimeout(nextWord,400);}
function startMic(){
  const SR=window.SpeechRecognition||window.webkitSpeechRecognition;
  if(!SR){learnState.pronR={text:'Trình duyệt không hỗ trợ',score:0};renderLearn();return;}
  const r=new SR();r.lang='en-US';r.continuous=false;r.interimResults=false;
  r.onstart=()=>{learnState.lis=true;renderLearn();};
  r.onend=()=>{learnState.lis=false;renderLearn();};
  r.onresult=(ev)=>{
    const t=ev.results[0][0].transcript.toLowerCase().trim(),tgt=getWord().word.toLowerCase(),cf=ev.results[0][0].confidence;
    let sc=0;if(t===tgt)sc=100;else if(t.includes(tgt)||tgt.includes(t))sc=70;
    else{const len=Math.max(t.length,tgt.length);let m=0;for(let i=0;i<Math.min(t.length,tgt.length);i++)if(t[i]===tgt[i])m++;sc=Math.round((m/len)*100);}
    sc=Math.min(100,Math.round(sc*(0.5+cf*0.5)));
    learnState.pronR={text:t,score:sc};renderLearn();
  };
  r.onerror=()=>{learnState.lis=false;learnState.pronR={text:'Không nhận diện được',score:0};renderLearn();};
  r.start();
}

/* ═══════════════  TAB 3: CHƠI  ═══════════════ */
let gameState={st:'idle'};
function initPlay(){gameState={st:'idle'};renderPlay();}
function renderPlay(){
  const g=gameState,el=document.getElementById('tab-play');
  if(g.st==='idle'){
    el.innerHTML=`<div style="padding:40px;text-align:center"><div style="font-size:56px;margin-bottom:12px">🎯</div><h3 style="font-size:20px;font-weight:800;margin-bottom:6px">Word Match</h3><p style="color:#64748B;margin-bottom:22px;line-height:1.6">Nối từ tiếng Anh với nghĩa tiếng Việt.<br>Nhanh và chính xác!</p><button class="btn-primary" onclick="startGame()">Bắt đầu chơi</button></div>`;
    return;
  }
  if(g.st==='finished'){
    const fmt=s=>`${Math.floor(s/60)}:${(s%60).toString().padStart(2,'0')}`;
    el.innerHTML=`<div style="padding:40px;text-align:center"><div style="font-size:56px;margin-bottom:10px">🏆</div><h3 style="font-size:22px;font-weight:800;margin-bottom:6px">Xuất sắc!</h3><p style="color:#64748B;margin-bottom:4px">Hoàn thành trong <strong style="color:#F1F5F9">${fmt(g.timer)}</strong></p><p style="color:var(--accent);font-size:26px;font-weight:800;margin-bottom:22px">⚡ ${g.score} pts</p><button class="btn-primary" onclick="startGame()">Chơi lại</button></div>`;
    return;
  }
  const fmt=s=>`${Math.floor(s/60)}:${(s%60).toString().padStart(2,'0')}`;
  let html=`<div style="padding:14px 14px 24px"><div class="game-header"><span class="game-stat" style="background:#F59E0B22;color:#FBBF24">✨ ${g.matched.size}/${g.pairs}</span><span class="game-stat" style="background:color-mix(in srgb,var(--accent) 15%,transparent);color:var(--accent)">⚡ ${g.score} pts</span><span class="game-stat" style="background:#1E293B;color:#64748B">⏱ ${fmt(g.timer)}</span></div><div class="match-grid">`;
  g.cards.forEach(cd=>{
    const m=g.matched.has(cd.wid),s=g.sel&&g.sel.id===cd.id,wr=g.wp&&g.wp.includes(cd.id),en=cd.lang==='en';
    let bg=en?'var(--accent)':'color-mix(in srgb,var(--accent) 20%,transparent)';
    let cl=en?'#fff':'var(--accent)';let bd='2.5px solid transparent';let extra='';
    if(m){bg='#1E2640';cl='#334155';bd='2.5px solid #1E2640';extra='matched';}
    else if(s){bd='2.5px solid var(--accent)';}
    else if(wr){bg='rgba(127,29,29,0.25)';cl='#FCA5A5';bd='2.5px solid #EF4444';extra='wrong-pair';}
    html+=`<button class="match-card ${extra}" style="background:${bg};color:${cl};border:${bd};font-size:${en?13:12}px;font-weight:${en?700:600}" onclick="pickCard('${cd.id}')" ${m?'disabled':''}>${cd.text}</button>`;
  });
  html+=`</div></div>`;
  el.innerHTML=html;
}
function startGame(){
  const sub=shuffle(WORDS).slice(0,6);
  const cards=shuffle([...sub.map(w=>({id:'en-'+w.id,wid:w.id,text:w.word,lang:'en'})),...sub.map(w=>({id:'vi-'+w.id,wid:w.id,text:w.vi,lang:'vi'}))]);
  gameState={st:'playing',cards,sel:null,matched:new Set(),wp:null,score:0,timer:0,pairs:sub.length};
  if(gameState.interval)clearInterval(gameState.interval);
  gameState.interval=setInterval(()=>{gameState.timer++;renderPlay();},1000);
  renderPlay();
}
function pickCard(id){
  const g=gameState;if(g.wp)return;
  const cd=g.cards.find(c=>c.id===id);if(!cd||g.matched.has(cd.wid))return;
  if(!g.sel){g.sel=cd;renderPlay();return;}
  if(g.sel.id===cd.id){g.sel=null;renderPlay();return;}
  if(g.sel.wid===cd.wid&&g.sel.lang!==cd.lang){
    g.matched.add(cd.wid);g.score+=10;g.sel=null;
    if(g.matched.size===g.pairs){clearInterval(g.interval);g.st='finished';}
    renderPlay();
  } else {
    g.wp=[g.sel.id,cd.id];renderPlay();
    setTimeout(()=>{g.wp=null;g.sel=null;renderPlay();},600);
  }
}
</script>
