    function getTopicWords(t) { return t.words || PLACEHOLDER; }

    function buildDB() {
      const db = [];
      TOPICS_META.forEach(t => {
        getTopicWords(t).forEach((w, i) => {
          db.push({
            id: `${t.id}_${i}`, tid: t.id, cid: t.cat, word: w.w, pos: w.p, ipa: w.ipa,
            L450: { vi: w.vi, en: w.en, ex: w.ex },
            L650: { fam: w.fam, col: w.col, ex: w.ex },
            L800: { syn: w.syn, ant: w.ant, trap: w.trap, sc: w.sc },
            srs: { iv: 1, ef: 2.5, nr: Date.now() - Math.random()*86400000, rep: 0 },
            meta: { sc: w.sc, trVi: w.ex, syn: w.syn || [] }
          });
        });
      });
      return db;
    }

    function sm2(srs, q) {
      const quality = [0,2,3,5][q];
      let { iv, ef, rep } = srs;
      if (quality < 3) { rep = 0; iv = 1; }
      else { if (rep === 0) iv = 1; else if (rep === 1) iv = 6; else iv = Math.round(iv * ef); rep++; }
      ef = ef + (0.1 - (5-quality) * (0.08 + (5-quality) * 0.02));
      if (ef < 1.3) ef = 1.3;
      return { iv, ef: Math.round(ef*100)/100, rep, nr: Date.now() + iv*86400000 };
    }

    function say(t, r=0.85) {
      if (typeof window !== "undefined" && window.speechSynthesis) {
        window.speechSynthesis.cancel();
        const u = new SpeechSynthesisUtterance(t); u.lang = "en-US"; u.rate = r;
        window.speechSynthesis.speak(u);
      }

          const targetId = cw ? cw.id : null;
          const i = u.findIndex(w => w.id === targetId); 
          if (i >= 0) u[i] = { ...u[i], srs: sm2(u[i].srs, q) }; 
          return u; 
        });
        setStats(s => ({ ...s, today: s.today + 1, total: s.total + 1 }));
        if (wi < tw.length - 1) setWi(i => i + 1); else { setScr("topic"); setWi(0); }
      }, [cw, wi, tw.length]);

      const nav = (s, id) => { if (s === "dash") { setTid(null); setWi(0); } if (id !== undefined) { setTid(id); setWi(0); } setScr(s); };

            ::-webkit-scrollbar{width:3px}::-webkit-scrollbar-thumb{background:rgba(255,255,255,.08);border-radius:2px}
            input::placeholder,textarea::placeholder{color:rgba(255,255,255,.25)}

            .app{max-width:480px;margin:0 auto;min-height:100vh}

            .tc{background:rgba(255,255,255,.015);border:1px solid rgba(255,255,255,.04);border-radius:12px;padding:10px;cursor:pointer;text-align:left;color:#E0E0E8;animation:fadeUp .3s ease both;width:100%;font-family:'Outfit',sans-serif}

            .inp{flex:1;padding:9px 12px;background:rgba(255,255,255,.02);border:1px solid rgba(255,255,255,.06);border-radius:8px;color:#E0E0E8;font-size:12px;outline:none;font-family:'Outfit',sans-serif}
            .ta{width:100%;padding:9px;background:rgba(255,255,255,.02);border:1px solid rgba(255,255,255,.06);border-radius:8px;color:#E0E0E8;font-size:12px;outline:none;font-family:'Outfit',sans-serif;resize:vertical;box-sizing:border-box}

            .sec h4{font-size:12px;font-weight:700;margin-bottom:6px}
          `}</style>
          <header className="hdr">
            <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
              {scr !== "dash" && <button className="btn" style={{ background: "rgba(255,255,255,.05)", color: "#A29BFE", width: 30, height: 30, borderRadius: 8, fontSize: 14 }} onClick={() => scr === "learn" || scr === "rp" ? nav("topic") : nav("dash")}>←</button>}
              <span style={{ fontSize: 20 }}>🎁</span>
              <span className="logo-t">Be A Gift</span>
              <span style={{ fontSize: 8, fontWeight: 700, padding: "2px 5px", background: "rgba(108,92,231,.2)", borderRadius: 4, color: "#A29BFE", letterSpacing: 1, marginLeft: 3 }}>TOEIC 600</span>
            </div>
            <div style={{ display: "flex", gap: 5 }}>
              <span className="pill">🔥{stats.streak}</span>
              <span className="pill" style={{ background: "rgba(108,92,231,.12)", color: "#A29BFE" }}>📚{stats.today}</span>
            </div>
          </header>

          {scr === "dash" && <Dash words={words} lv={lv} setLv={setLv} onT={id => nav("topic", id)} stats={stats} />}
          {scr === "topic" && topic && <TopicV topic={topic} tw={tw} lv={lv} setLv={setLv} onStart={() => { setWi(0); nav("learn"); }} />}
          {scr === "learn" && cw && <Learn w={cw} lv={lv} onSRS={doSRS} wi={wi} total={tw.length} onRP={() => nav("rp")} />}
          {scr === "rp" && cw && <RP w={cw} onBack={() => nav("learn")} />}
        </div>
      );
    }

    function Dash({ words, lv, setLv, onT, stats }) {
      const [q, setQ] = useState("");
      const [expCat, setExpCat] = useState("C01");
      const c = LV[lv];
      const learned = words.filter(w => w.srs.rep > 0).length;
      const due = words.filter(w => w.srs.nr <= Date.now()).length;
      const mastered = words.filter(w => w.srs.iv >= 21).length;
      const filtered = q ? TOPICS_META.filter(t => (t.name + t.vi).toLowerCase().includes(q.toLowerCase())) : TOPICS_META;
      const grouped = CAT.map(cat => ({ ...cat, topics: filtered.filter(t => t.cat === cat.id) })).filter(g => g.topics.length > 0);

      return (
        <div className="scr">
          <div className="hero" style={{ background: c.g }}>
            <div style={{ display: "flex", justifyContent: "space-between", marginBottom: 16 }}>
              <div>
                <div style={{ fontSize: 9, opacity: .7, letterSpacing: 1.5, textTransform: "uppercase" }}>{c.ic} {c.lb}</div>
                <h1 style={{ fontSize: 20, fontWeight: 800 }}>600 Essential Words</h1>
                <p style={{ fontSize: 11, opacity: .8, marginTop: 3 }}>10 Categories × 5 Topics × 12 Words</p>
              </div>
              <div style={{ textAlign: "right" }}>
                <div className="jm" style={{ fontSize: 34, fontWeight: 800, lineHeight: 1 }}>{learned}</div>
                <div style={{ fontSize: 9, opacity: .6 }}>active</div>
              </div>
            </div>
            <div style={{ display: "flex", background: "rgba(0,0,0,.2)", borderRadius: 10, padding: "10px 0" }}>
              {[{ n: mastered, l: "Mastered" }, { n: due, l: "Due" }, { n: stats.streak, l: "Streak" }, { n: stats.total, l: "Reviews" }].map((s, i) => (
                <div key={i} style={{ flex: 1, textAlign: "center" }}>
                  <div className="jm" style={{ fontSize: 16, fontWeight: 700 }}>{s.n}</div>
                  <div style={{ fontSize: 9, opacity: .6 }}>{s.l}</div>
                </div>
              ))}
            </div>
          </div>

          <div style={{ display: "flex", gap: 5, marginBottom: 12 }}>
            {Object.entries(LV).map(([k, v]) => (
              <button key={k} className="btn" style={{ flex: 1, padding: "8px 4px", borderRadius: 10, fontSize: 11, textAlign: "center", background: lv === k ? v.g : "rgba(255,255,255,.02)", color: lv === k ? "#fff" : "#666", border: lv === k ? "none" : "1px solid rgba(255,255,255,.05)", fontWeight: lv === k ? 700 : 400 }} onClick={() => setLv(k)}>
                {v.ic} {v.lb}
              </button>
            ))}
          </div>

          <div style={{ display: "flex", alignItems: "center", gap: 6, background: "rgba(255,255,255,.02)", borderRadius: 10, padding: "8px 12px", marginBottom: 12, border: "1px solid rgba(255,255,255,.03)" }}>
            <span>🔍</span>
            <input className="inp" style={{ border: "none", background: "transparent" }} placeholder="Tìm chủ đề..." value={q} onChange={e => setQ(e.target.value)} />
          </div>

          <div style={{ display: "flex", flexDirection: "column", gap: 6 }}>
            {grouped.map(cat => {
              const isOpen = !!q || expCat === cat.id;
              const cws = words.filter(w => w.cid === cat.id);
              const cl = cws.filter(w => w.srs.rep > 0).length;
              const cp = Math.round(cl / (cat.topics.length * 12) * 100);

              return (
                <div key={cat.id} style={{ background: "rgba(255,255,255,.015)", borderRadius: 12, border: "1px solid rgba(255,255,255,.04)", overflow: "hidden" }}>
                  <button className="btn" style={{ width: "100%", display: "flex", alignItems: "center", justifyContent: "space-between", padding: "11px 14px", background: "transparent", color: "#E0E0E8", textAlign: "left" }} onClick={() => setExpCat(isOpen && !q ? null : cat.id)}>
                    <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
                      <span style={{ fontSize: 18 }}>{cat.ic}</span>
                      <div>
                        <div style={{ fontSize: 12, fontWeight: 700 }}>
                          <span className="jm" style={{ color: cat.c, fontSize: 10, marginRight: 4 }}>{cat.n}.</span>{cat.name}
                        </div>
                        <div style={{ fontSize: 9, color: "#555" }}>{cat.vi}</div>
                      </div>
                    </div>
                    <div style={{ display: "flex", alignItems: "center", gap: 6 }}>
                      <div style={{ width: 36, height: 3, borderRadius: 2, background: "rgba(255,255,255,.04)", overflow: "hidden" }}>
                        <div style={{ height: "100%", width: `${cp}%`, background: cat.c, borderRadius: 2 }} />
                      </div>
                      <span className="jm" style={{ fontSize: 9, color: "#444" }}>{cp}%</span>
                      <span style={{ fontSize: 11, color: "#444", transform: isOpen ? "rotate(90deg)" : "rotate(0)", transition: "transform .2s" }}>▸</span>
                    </div>
                  </button>

                  {isOpen && (
                    <div style={{ padding: "0 8px 8px", display: "grid", gridTemplateColumns: "1fr 1fr", gap: 5 }}>
                      {cat.topics.map((t, i) => {
                        const tws = words.filter(w => w.tid === t.id);
                        const l = tws.filter(w => w.srs.rep > 0).length;
                        const pct = Math.round(l / 12 * 100);
                        const hasData = !!t.words;
                        return (
                          <button key={t.id} className="tc" style={{ animationDelay: `${i * 25}ms` }} onClick={() => onT(t.id)}>
                            <div style={{ display: "flex", justifyContent: "space-between" }}>
                              <span style={{ fontSize: 18 }}>{t.ic}</span>
                              <div style={{ display: "flex", gap: 3, alignItems: "center" }}>
                                {!hasData && <span style={{ fontSize: 7, padding: "2px 4px", background: "rgba(255,255,255,.04)", borderRadius: 3, color: "#444" }}>SOON</span>}
                                <span className="jm" style={{ fontSize: 8, color: "#444" }}>{t.n}</span>
                              </div>
                            </div>
                            <div style={{ marginTop: 4 }}>
                              <div style={{ fontSize: 10, fontWeight: 600, lineHeight: 1.2 }}>{t.name}</div>
                              <div style={{ fontSize: 8, color: "#555", marginTop: 1 }}>{t.vi}</div>
                              <div style={{ fontSize: 8, color: "#444", marginTop: 1 }}>{l}/12</div>
                            </div>
                            <div style={{ marginTop: 4, height: 3, borderRadius: 2, background: "rgba(255,255,255,.04)", overflow: "hidden" }}>
                              <div style={{ height: "100%", width: `${pct}%`, background: t.c, borderRadius: 2 }} />
                            </div>
                          </button>
                        );
                      })}
                    </div>
                  )}
                </div>
              );
            })}
          </div>
        </div>
      );
    }

    function TopicV({ topic, tw, lv, setLv, onStart }) {
      const c = LV[lv];
      const cat = CAT.find(cc => cc.id === topic.cat);
      const hasData = !!topic.words;

      return (
        <div className="scr">
          <div className="hero" style={{ background: c.g, textAlign: "center" }}>
            {cat && <div style={{ fontSize: 9, opacity: .7, letterSpacing: 1 }}>{cat.n}. {cat.name}</div>}
            <div style={{ fontSize: 42 }}>{topic.ic}</div>
            <h2 style={{ fontSize: 18, fontWeight: 800, margin: "6px 0 2px" }}>{topic.name}</h2>
            <p style={{ fontSize: 12, opacity: .7 }}>{topic.vi} · 12 words · {c.lb}</p>
            <div style={{ display: "flex", gap: 4, justifyContent: "center", marginTop: 10 }}>
              {Object.entries(LV).map(([k, v]) => (
                <button key={k} className="btn" onClick={() => setLv(k)} style={{ padding: "5px 10px", borderRadius: 14, color: "#fff", fontSize: 10, background: lv === k ? "rgba(255,255,255,.22)" : "rgba(255,255,255,.06)", fontWeight: lv === k ? 700 : 400 }}>
                  {v.ic} {v.lb}
                </button>
              ))}
            </div>
          </div>

          {!hasData && (
            <div style={{ padding: 16, background: "rgba(253,203,110,.06)", borderRadius: 10, border: "1px solid rgba(253,203,110,.12)", marginBottom: 10, textAlign: "center" }}>
              <div style={{ fontSize: 24, marginBottom: 6 }}>🔜</div>
              <div style={{ fontSize: 12, fontWeight: 600, color: "#FFEAA7" }}>Nội dung đang được cập nhật</div>
            </div>
          )}

          <div style={{ display: "flex", flexDirection: "column", gap: 4 }}>
            {tw.map((w, i) => (
              <div key={w.id} style={{ display: "flex", justifyContent: "space-between", alignItems: "center", padding: "8px 12px", background: "rgba(255,255,255,.015)", borderRadius: 8, border: "1px solid rgba(255,255,255,.03)" }}>
                <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
                  <div style={{ width: 20, height: 20, borderRadius: "50%", background: "rgba(108,92,231,.12)", display: "flex", alignItems: "center", justifyContent: "center", fontSize: 9, fontWeight: 700, color: "#A29BFE", flexShrink: 0 }}>{i + 1}</div>
                  <div>
                    <div style={{ fontSize: 13, fontWeight: 600 }}>{w.word}</div>
                    <div style={{ fontSize: 10, color: "#666" }}>{w.ipa}</div>
                  </div>
                </div>
                <div style={{ display: "flex", alignItems: "center", gap: 6 }}>
                  <span style={{ fontSize: 9, padding: "2px 6px", background: "rgba(255,255,255,.04)", borderRadius: 4, color: "#777" }}>{w.pos}</span>
                  {hasData && <button className="btn" style={{ background: "transparent", fontSize: 14 }} onClick={() => say(w.word)}>🔊</button>}
                  <SRSBadge srs={w.srs} />
                </div>
              </div>
            ))}
          </div>

          {hasData && (
            <div style={{ position: "fixed", bottom: 14, left: "50%", transform: "translateX(-50%)", width: "calc(100% - 28px)", maxWidth: 440, zIndex: 50 }}>
              <button className="btn" style={{ width: "100%", padding: 13, borderRadius: 12, color: "#fff", fontSize: 14, fontWeight: 700, background: c.g, boxShadow: "0 6px 24px rgba(0,0,0,.35)" }} onClick={onStart}>
                ▶ Bắt đầu học
              </button>
            </div>
          )}
        </div>
      );
    }

    function SRSBadge({ srs }) {
      const isDue = srs.nr <= Date.now();
      const label = srs.rep === 0 ? "New" : srs.iv >= 21 ? "✓" : isDue ? "Due" : `${srs.iv}d`;
      const bg = srs.rep === 0 ? "#555" : srs.iv >= 21 ? "#00B894" : isDue ? "#E17055" : "#6C5CE7";
      return <span style={{ fontSize: 8, padding: "2px 5px", borderRadius: 4, background: bg, color: "#fff", fontWeight: 600 }}>{label}</span>;
    }

    function Learn({ w, lv, onSRS, wi, total, onRP }) {
      const [busy, setBusy] = useState(false);
      const [wTypeIn, setWTypeIn] = useState("");
      const [wTypeRes, setWTypeRes] = useState(null);
      const [wSpeakRes, setWSpeakRes] = useState(null);
      const [transIn, setTransIn] = useState("");
      const [transRes, setTransRes] = useState(null);
      const [dictIn, setDictIn] = useState("");
      const [dictRes, setDictRes] = useState(null);
      const [sentSpeakRes, setSentSpeakRes] = useState(null);

      const c = LV[lv];
      const d = w[lv];

      useEffect(() => { 
        setWTypeIn(""); setWTypeRes(null); setWSpeakRes(null);
        setTransIn(""); setTransRes(null); 
        setDictIn(""); setDictRes(null); setSentSpeakRes(null);
      }, [w ? w.id : null, lv]);

      const handleSpeak = (setResState) => {
        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        if (!SpeechRecognition) {
          alert("Trình duyệt của bạn không hỗ trợ nhận diện giọng nói. Vui lòng dùng Chrome/Safari bản mới nhất.");
          return;
        }
        const recognition = new SpeechRecognition();
        recognition.lang = 'en-US';
        recognition.interimResults = false;
        
        setBusy(true);
        recognition.start();

        recognition.onresult = (event) => {
          const transcript = event.results[0][0].transcript;
          setResState(transcript);
          setBusy(false);
        };

        recognition.onerror = () => {
          alert("Không nghe được âm thanh, vui lòng thử lại.");
          setBusy(false);
        };

        recognition.onend = () => setBusy(false);
      };

      const checkAccuracy = (input, target) => {
        if (!input || !target) return 0;
        const t = target.toLowerCase().replace(/[.,!?]/g, '').split(/\s+/);
        const inp = input.toLowerCase().replace(/[.,!?]/g, '').split(/\s+/);
        let m = 0;
        t.forEach((x, i) => { if (inp[i] === x) m++; });
        return Math.round((m / t.length) * 100);
      };

      return (
        <div className="scr">
          <div style={{ display: "flex", alignItems: "center", gap: 8, marginBottom: 8 }}>
            <div style={{ flex: 1, height: 4, background: "rgba(255,255,255,.04)", borderRadius: 2, overflow: "hidden" }}>
              <div style={{ height: "100%", width: `${(wi + 1) / total * 100}%`, background: c.g, borderRadius: 2, transition: "width .3s" }} />
            </div>
            <span className="jm" style={{ fontSize: 10, color: "#555" }}>{wi + 1}/{total}</span>
          </div>

          <div style={{ display: "inline-block", padding: "4px 12px", borderRadius: 14, fontSize: 11, fontWeight: 600, background: c.g, marginBottom: 10 }}>{c.ic} {c.lb}</div>

          <div className="card">
            <div style={{ display: "flex", justifyContent: "space-between", paddingBottom: 12, borderBottom: "1px solid rgba(255,255,255,.04)", marginBottom: 12 }}>
              <div>
                <h2 className="jm" style={{ fontSize: 26, fontWeight: 800, letterSpacing: -.5 }}>{w.word}</h2>
                <div style={{ display: "flex", gap: 6, marginTop: 3 }}>
                  <span style={{ fontSize: 10, padding: "2px 7px", background: "rgba(108,92,231,.12)", borderRadius: 5, color: "#A29BFE", fontWeight: 600 }}>{w.pos}</span>
                  <span style={{ fontSize: 11, color: "#666" }}>{w.ipa}</span>
                </div>
              </div>
              <button className="btn" style={{ width: 40, height: 40, borderRadius: "50%", background: "rgba(108,92,231,.1)", border: "1px solid rgba(108,92,231,.2)", fontSize: 18 }} onClick={() => say(w.word)}>🔊</button>
            </div>

            {lv === "L450" && (
              <div>
                <div className="sec">
                  <div style={{ padding: 16, background: "rgba(0,184,148,.06)", borderRadius: 10, border: "1px solid rgba(0,184,148,.12)", textAlign: "center", marginBottom: 16 }}>
                    <div style={{ fontSize: 18, fontWeight: 700, color: "#00B894", marginBottom: 8 }}>🇻🇳 {d && d.vi}</div>
                    <div style={{ fontSize: 13, color: "#ccc", fontStyle: "italic", display: "flex", alignItems: "flex-start", justifyContent: "center", gap: 8 }}>
                      <button className="btn" style={{ background: "rgba(108,92,231,.15)", borderRadius: "50%", width: 20, height: 20, fontSize: 10, flexShrink: 0, marginTop: 2 }} onClick={() => say((d && d.ex) || "")}>🔊</button>
                      <span style={{ textAlign: "left" }}>"{d && d.ex}"</span>
                    </div>
                  </div>
                </div>
                <div className="sec"><h4>⌨️ Nghe & Gõ lại từ</h4>
                  <div style={{ display: "flex", gap: 5 }}>
                    <button className="btn" style={{ background: "rgba(108,92,231,.12)", color: "#A29BFE", padding: "0 12px", borderRadius: 8, fontSize: 14 }} onClick={() => say(w.word, 0.85)}>🔊</button>
                    <input className="inp" placeholder="Gõ lại từ vừa nghe..." value={wTypeIn} onChange={e => setWTypeIn(e.target.value)} onKeyDown={e => { if (e.key === "Enter") setWTypeRes(wTypeIn.trim().toLowerCase() === w.word.toLowerCase()); }} />
                    <button className="btn" style={{ padding: "9px 16px", background: "linear-gradient(135deg,#00B894,#00CEC9)", borderRadius: 8, color: "#fff", fontWeight: 600, fontSize: 11 }} onClick={() => setWTypeRes(wTypeIn.trim().toLowerCase() === w.word.toLowerCase())}>Check</button>
                  </div>
                  {wTypeRes !== null && <div style={{ marginTop: 6, fontSize: 12, color: wTypeRes ? "#00B894" : "#E17055", fontWeight: 600 }}>{wTypeRes ? "✅ Chính xác!" : "❌ Chưa đúng, thử lại nhé!"}</div>}
                </div>
                <div className="sec"><h4>🎙️ Nghe & Phát âm từ</h4>
                   <button className="btn" style={{ width: "100%", padding: 11, background: busy ? "rgba(255,255,255,.1)" : "linear-gradient(135deg,#6C5CE7,#A29BFE)", borderRadius: 8, color: "#fff", fontSize: 12, fontWeight: 600 }} onClick={() => handleSpeak(setWSpeakRes)} disabled={busy}>{busy ? "🎧 Đang nghe..." : "🎤 Bấm để đọc từ"}</button>
                   {wSpeakRes && <div style={{ marginTop: 8, padding: 10, background: "rgba(255,255,255,.02)", border: "1px solid rgba(255,255,255,.05)", borderRadius: 8 }}><div style={{ fontSize: 10, color: "#888" }}>Bạn đã đọc: <strong style={{ color: "#E0E0E8" }}>{wSpeakRes}</strong></div><div style={{ marginTop: 4, fontSize: 12, fontWeight: 700, color: checkAccuracy(wSpeakRes, w.word) >= 80 ? "#00B894" : "#FDCB6E" }}>{checkAccuracy(wSpeakRes, w.word) >= 80 ? "✅ Phát âm rất tốt!" : "⚠️ Cần luyện tập thêm!"}</div></div>}
                </div>
              </div>
            )}

            {lv === "L650" && (
              <div>
                <div className="sec"><h4>🧩 Word Family</h4>
                  <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 5 }}>
                    {d && d.fam && Object.entries(d.fam).map(([k, v]) => <div key={k} style={{ padding: "7px 9px", background: "rgba(108,92,231,.06)", borderRadius: 7, border: "1px solid rgba(108,92,231,.1)" }}><div style={{ fontSize: 9, textTransform: "uppercase", color: "#A29BFE", fontWeight: 700 }}>{k}</div><div style={{ fontSize: 12, marginTop: 2 }}>{v}</div></div>)}
                  </div>
                </div>
                <div className="sec"><h4>🔗 Collocations</h4>
                  <div style={{ display: "flex", flexWrap: "wrap", gap: 4 }}>
                    {d && d.col && d.col.map((cc, i) => <span key={i} className="chip" style={{ background: "rgba(0,184,148,.06)", border: "1px solid rgba(0,184,148,.12)", color: "#55EFC4", fontSize: 12, padding: "6px 12px" }}>{cc}</span>)}
                  </div>
                </div>
              </div>
            )}

            {lv === "L800" && (
              <div>
                <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 8, marginBottom: 16 }}>
                  <div className="sec" style={{ marginBottom: 0 }}><h4>🔄 Synonyms</h4>
                    <div style={{ display: "flex", flexWrap: "wrap", gap: 4 }}>{d && d.syn && d.syn.map((s, i) => <span key={i} className="chip" style={{ background: "rgba(225,112,85,.06)", border: "1px solid rgba(225,112,85,.12)", color: "#FAB1A0" }}>{s}</span>)}</div>
                  </div>
                  <div className="sec" style={{ marginBottom: 0 }}><h4>↕️ Antonyms</h4>
                    <div style={{ display: "flex", flexWrap: "wrap", gap: 4 }}>{d && d.ant && d.ant.length > 0 ? d.ant.map((a, i) => <span key={i} className="chip" style={{ background: "rgba(9,132,227,.06)", border: "1px solid rgba(9,132,227,.12)", color: "#74B9FF" }}>{a}</span>) : <span style={{ fontSize: 11, color: "#666" }}>Đang cập nhật...</span>}</div>
                  </div>
                </div>
                <div className="sec"><h4>⚠️ TOEIC Trap</h4><div style={{ padding: 10, background: "rgba(253,203,110,.05)", border: "1px solid rgba(253,203,110,.12)", borderRadius: 8, fontSize: 12, lineHeight: 1.45, color: "#FFEAA7" }}>{d && d.trap}</div></div>
                <div className="sec"><h4>🇻🇳→🇬🇧 Translation</h4>
                  <div style={{ padding: 10, background: "rgba(255,255,255,.015)", borderRadius: 8, border: "1px solid rgba(255,255,255,.03)", marginBottom: 6 }}><p style={{ fontSize: 12, margin: "0 0 3px" }}>"{w.meta && w.meta.trVi}"</p><p style={{ fontSize: 10, color: "#666", margin: 0 }}>Dùng từ: <strong style={{ color: "#A29BFE" }}>{w.word}</strong></p></div>
                  <textarea className="ta" placeholder="Dịch sang tiếng Anh..." value={transIn} onChange={e => setTransIn(e.target.value)} rows={2} />
                  <button className="btn" style={{ width: "100%", padding: 11, background: "rgba(255,255,255,.05)", border: "1px solid rgba(255,255,255,.1)", borderRadius: 8, color: "#fff", fontSize: 12, fontWeight: 600, marginTop: 5 }} onClick={() => { const has = transIn.toLowerCase().includes(w.word.toLowerCase()); setTransRes({ total: has ? 9 : 5, feedback: has ? `Tốt lắm! Bạn đã dùng đúng từ "${w.word}".` : `Nhớ dùng từ "${w.word}" nhé.`, corrected: (w.L450 && w.L450.ex) || "" }); }}>Kiểm tra</button>
                  {transRes && <div style={{ marginTop: 8, padding: 10, background: "rgba(255,255,255,.02)", border: "1px solid rgba(108,92,231,.12)", borderRadius: 8 }}><div style={{ fontSize: 11, color: "#bbb", marginBottom: 6 }}>{transRes.feedback}</div><div style={{ fontSize: 11, color: "#00B894" }}>✅ Câu mẫu: {transRes.corrected}</div></div>}
                </div>
                <div className="sec"><h4>🎧 Dictation</h4>
                  <button className="btn" style={{ background: "rgba(108,92,231,.12)", border: "1px solid rgba(108,92,231,.2)", color: "#A29BFE", padding: "7px 16px", borderRadius: 8, fontSize: 11, fontWeight: 600 }} onClick={() => say((w.L450 && w.L450.ex) || "", 0.8)}>▶ Nghe câu mẫu</button>
                  <div style={{ display: "flex", gap: 5, marginTop: 6 }}><input className="inp" placeholder="Gõ lại câu bạn nghe được..." value={dictIn} onChange={e => setDictIn(e.target.value)} onKeyDown={e => { if (e.key === "Enter") { setDictRes({ acc: checkAccuracy(dictIn, w.L450 && w.L450.ex), tgt: w.L450 && w.L450.ex }); } }} /><button className="btn" style={{ padding: "9px 16px", background: "linear-gradient(135deg,#6C5CE7,#A29BFE)", borderRadius: 8, color: "#fff", fontWeight: 600, fontSize: 11 }} onClick={() => setDictRes({ acc: checkAccuracy(dictIn, w.L450 && w.L450.ex), tgt: w.L450 && w.L450.ex })}>Check</button></div>
                  {dictRes && <div style={{ marginTop: 6, padding: "8px 10px", borderRadius: 8, border: `1px solid ${dictRes.acc >= 80 ? "#00B894" : "#E17055"}`, background: "rgba(255,255,255,.015)" }}><span className="jm" style={{ fontSize: 13, fontWeight: 700, color: dictRes.acc >= 80 ? "#00B894" : "#E17055" }}>Độ chính xác: {dictRes.acc}%</span><div style={{ fontSize: 11, color: "#aaa", marginTop: 4 }}>Đáp án: {dictRes.tgt}</div></div>}
                </div>
                <div className="sec"><h4>🗣️ Speaking</h4>
                  <div style={{ padding: 10, background: "rgba(255,255,255,.02)", border: "1px solid rgba(255,255,255,.05)", borderRadius: 8, marginBottom: 8, fontSize: 13, color: "#E0E0E8" }}>"{w.L450 && w.L450.ex}"</div>
                  <button className="btn" style={{ width: "100%", padding: 11, background: busy ? "rgba(255,255,255,.1)" : "linear-gradient(135deg,#E17055,#FDCB6E)", borderRadius: 8, color: "#fff", fontSize: 12, fontWeight: 700 }} onClick={() => handleSpeak(setSentSpeakRes)} disabled={busy}>{busy ? "🎧 Đang nghe..." : "🎙️ Bấm để đọc câu này"}</button>
                   {sentSpeakRes && <div style={{ marginTop: 8, padding: 10, background: "rgba(255,255,255,.02)", border: "1px solid rgba(255,255,255,.05)", borderRadius: 8 }}><div style={{ fontSize: 11, color: "#888" }}>Bạn đọc: <span style={{ color: "#ccc" }}>{sentSpeakRes}</span></div><div style={{ marginTop: 6, fontSize: 12, fontWeight: 700, color: checkAccuracy(sentSpeakRes, w.L450 && w.L450.ex) >= 75 ? "#00B894" : "#FDCB6E" }}>{checkAccuracy(sentSpeakRes, w.L450 && w.L450.ex) >= 75 ? "🎉 Xuất sắc! Phát âm rất rõ ràng." : "💪 Cố lên, đọc chậm và rõ chữ hơn nhé!"}</div></div>}
                </div>
                <div className="sec"><h4>🎭 AI Business Roleplay</h4><div style={{ padding: 10, background: "rgba(225,112,85,.05)", border: "1px solid rgba(225,112,85,.12)", borderRadius: 8, color: "#FAB1A0", fontSize: 11, lineHeight: 1.45 }}>{d && d.sc}</div><button className="btn" style={{ width: "100%", padding: 11, background: "linear-gradient(135deg,#E17055,#FDCB6E)", borderRadius: 8, color: "#fff", fontSize: 12, fontWeight: 700, marginTop: 6 }} onClick={onRP}>🎙️ Bắt đầu Roleplay</button></div>
              </div>
            )}
          </div>

          <div style={{ padding: 12, background: "rgba(8,8,12,.95)", backdropFilter: "blur(20px)", borderRadius: "16px 16px 0 0", border: "1px solid rgba(255,255,255,.03)", position: "fixed", bottom: 0, left: "50%", transform: "translateX(-50%)", width: "100%", maxWidth: 480, boxSizing: "border-box", zIndex: 50 }}>
            <div style={{ textAlign: "center", fontSize: 10, color: "#555", marginBottom: 6 }}>Mức độ ghi nhớ của bạn?</div>
            <div style={{ display: "flex", gap: 5 }}>
              {[{ l: "Lại", e: "🔴", clr: "#E17055", q: 0 }, { l: "Khó", e: "🟠", clr: "#FDCB6E", q: 1 }, { l: "Tốt", e: "🟢", clr: "#00B894", q: 2 }, { l: "Dễ", e: "🔵", clr: "#6C5CE7", q: 3 }].map(b => (
                <button key={b.q} className="btn" style={{ flex: 1, display: "flex", flexDirection: "column", alignItems: "center", gap: 1, padding: "8px 0", background: "rgba(255,255,255,.015)", border: `1px solid ${b.clr}`, borderRadius: 8, color: "#E0E0E8" }} onClick={() => onSRS(b.q)}>
                  <span style={{ fontSize: 12 }}>{b.e}</span><span style={{ fontSize: 10, fontWeight: 600 }}>{b.l}</span>
                </button>
              ))}
            </div>
          </div>
        </div>
      );
    }

    function RP({ w, onBack }) {
      const [msgs, setMsgs] = useState([]);
      const [inp, setInp] = useState("");
      const [kwU, setKwU] = useState([]);
      const [pass, setPass] = useState(false);
      const [typ, setTyp] = useState(false);
      const end = useRef(null);
      const kws = useMemo(() => [w.word, ...((w.meta && w.meta.syn) || []).slice(0, 2)], [w.id]);

      useEffect(() => { setMsgs([{ r: "ai", t: `Hi! ${(w.L800 && w.L800.sc) || "About our project..."} How should we proceed?` }]); setKwU([]); setPass(false); }, [w.id]);
      useEffect(() => { end.current && end.current.scrollIntoView({ behavior: "smooth" }); }, [msgs]);

      const send = async () => {
        if (!inp.trim()) return;
        const msg = inp; setMsgs(p => [...p, { r: "user", t: msg }]); setInp("");
        const nu = kws.filter(k => msg.toLowerCase().includes(k.toLowerCase()));
        const au = [...new Set([...kwU, ...nu])]; setKwU(au); if (au.length >= 3) setPass(true);
        setTyp(true); await new Promise(r => setTimeout(r, 900 + Math.random() * 700));
        const tn = msgs.filter(m => m.r === "ai").length;
        const rs = [`Good point. How does this affect our ${kws[1] || "timeline"}?`, `I agree we should ${w.word} this. Next step?`, `Let me check the ${kws[2] || "budget"} implications.`, `If we ${w.word} well, both sides benefit.`, `Great talk! I'll send a summary. ${au.length >= 3 ? "🎉" : ""}`];
        setMsgs(p => [...p, { r: "ai", t: rs[Math.min(tn, rs.length - 1)] }]); setTyp(false);
      };

      return (
        <div className="scr">
          <div style={{ background: "linear-gradient(135deg,#E17055,#FDCB6E)", borderRadius: 14, padding: "14px 16px", marginBottom: 8 }}>
            <div style={{ display: "flex", alignItems: "center", gap: 8, color: "#fff" }}><span style={{ fontSize: 24 }}>🎭</span><div><div style={{ fontSize: 14, fontWeight: 700 }}>Business Roleplay</div><div style={{ fontSize: 10, opacity: .8 }}>Dùng {kws.length} từ khóa để qua bài</div></div></div>
          </div>
          <div style={{ padding: "8px 12px", background: "rgba(255,255,255,.02)", borderRadius: 10, border: "1px solid rgba(255,255,255,.04)", marginBottom: 8 }}>
            <div style={{ fontSize: 9, color: "#555", marginBottom: 4 }}>Từ khóa mục tiêu:</div>
            <div style={{ display: "flex", flexWrap: "wrap", gap: 4 }}>{kws.map((k, i) => <span key={i} style={{ padding: "3px 8px", borderRadius: 12, fontSize: 10, border: "1px solid", background: kwU.includes(k) ? "rgba(0,184,148,.12)" : "rgba(255,255,255,.02)", borderColor: kwU.includes(k) ? "#00B894" : "rgba(255,255,255,.08)", color: kwU.includes(k) ? "#55EFC4" : "#777", textDecoration: kwU.includes(k) ? "line-through" : "none" }}>{kwU.includes(k) ? "✅" : "○"} {k}</span>)}</div>
            {pass && <div style={{ marginTop: 6, padding: 5, background: "rgba(0,184,148,.12)", borderRadius: 6, textAlign: "center", fontSize: 11, fontWeight: 700, color: "#00B894" }}>🎉 XUẤT SẮC!</div>}
          </div>
          <div style={{ maxHeight: "40vh", overflowY: "auto", display: "flex", flexDirection: "column", gap: 6, marginBottom: 8 }}>
            {msgs.map((m, i) => (
              <div key={i} style={{ display: "flex", justifyContent: m.r === "user" ? "flex-end" : "flex-start", gap: 5, alignItems: "flex-end" }}>
                {m.r === "ai" && <div style={{ width: 28, height: 28, borderRadius: "50%", background: "rgba(108,92,231,.12)", display: "flex", alignItems: "center", justifyContent: "center", fontSize: 12, flexShrink: 0 }}>🤖</div>}
                <div style={{ maxWidth: "78%", padding: "9px 13px", fontSize: 12, lineHeight: 1.45, color: "#E0E0E8", background: m.r === "user" ? "linear-gradient(135deg,#6C5CE7,#A29BFE)" : "rgba(255,255,255,.05)", borderRadius: m.r === "user" ? "14px 14px 3px 14px" : "14px 14px 14px 3px" }}>{m.t}</div>
              </div>
            ))}
            {typ && <div style={{ display: "flex", gap: 5, alignItems: "flex-end" }}><div style={{ width: 28, height: 28, borderRadius: "50%", background: "rgba(108,92,231,.12)", display: "flex", alignItems: "center", justifyContent: "center", fontSize: 12, flexShrink: 0 }}>🤖</div><div style={{ padding: "9px 13px", background: "rgba(255,255,255,.05)", borderRadius: "14px 14px 14px 3px" }}><span style={{ animation: "pulse 1s infinite", color: "#555" }}>● ● ●</span></div></div>}
            <div ref={end} />
          </div>
          <div style={{ display: "flex", gap: 5 }}>
            <input className="inp" style={{ borderRadius: 20, padding: "10px 14px" }} placeholder="Nhập tin nhắn..." value={inp} onChange={e => setInp(e.target.value)} onKeyDown={e => e.key === "Enter" && send()} />
            <button className="btn" style={{ width: 40, height: 40, borderRadius: "50%", background: "linear-gradient(135deg,#6C5CE7,#A29BFE)", color: "#fff", fontSize: 14, display: "flex", alignItems: "center", justifyContent: "center", flexShrink: 0 }} onClick={send}>➤</button>
          </div>
          <button className="btn" style={{ width: "100%", padding: 8, background: "rgba(255,255,255,.02)", border: "1px solid rgba(255,255,255,.04)", borderRadius: 8, color: "#666", fontSize: 11, marginTop: 8 }} onClick={onBack}>← Quay lại</button>
        </div>
      );
    }
  </script>
</body>
</html>
